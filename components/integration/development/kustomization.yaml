apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=8b0347493f43cf4560d90e6ce4f28c6f01d4894d
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=8b0347493f43cf4560d90e6ce4f28c6f01d4894d
images:
  - name: quay.io/redhat-appstudio/integration-service
    newName: quay.io/kasem_org/integration-service
    newTag: checkrun-0.12
configMapGenerator:
  - name: integration-config
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="3h"
      - TASKS_TIMEOUT="2h"
      - FINALLY_TIMEOUT="1h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
components:
  - ../rh-certs
