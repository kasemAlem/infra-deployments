apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=cb589d55c1bc8b4d80b8e8ba94109ea83e46ee50
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=cb589d55c1bc8b4d80b8e8ba94109ea83e46ee50
images:
  - name: quay.io/redhat-appstudio/integration-service
    newName: quay.io/kasem_org/integration-service
    newTag: commitstatus-0.1
configMapGenerator:
  - name: integration-config
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="6h"
      - TASKS_TIMEOUT="4h"
      - FINALLY_TIMEOUT="2h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
components:
  - ../rh-certs
